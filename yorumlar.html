<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raptyle | Yorumlar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;600;700;800&display=swap&subset=latin-ext"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body data-page="reviews">
    <div class="site-shell">
      <header class="topbar">
        <nav class="nav nav-left">
          <a href="./koleksiyon.html">Koleksiyon</a>
          <a href="./kalite.html">Kalite</a>
        </nav>
        <a class="brand brand-inline" href="./index.html" aria-label="Raptyle ana sayfa">
          <img src="./images/logo.png" alt="Raptyle logo" />
        </a>
        <nav class="nav nav-right">
          <a class="active" href="./yorumlar.html">Yorumlar</a>
          <a href="./admin.html">Admin Panel</a>
        </nav>
        <div class="topbar-actions">
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Temayı değiştir" aria-pressed="false">
            <span class="theme-toggle-icon" aria-hidden="true">☾</span>
            <span class="theme-toggle-label">Tema</span>
          </button>
          <a class="button primary cart-link" href="./sepet.html" aria-label="Sepet">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 5h2l1.3 7.2A2 2 0 0 0 8.3 14H17a2 2 0 0 0 1.9-1.4L21 7H7.1" />
              <circle cx="9" cy="19" r="1.6" />
              <circle cx="17" cy="19" r="1.6" />
            </svg>
            <span class="cart-label">Sepet</span>
            <span class="cart-count" data-cart-count>0</span>
          </a>
        </div>
      </header>

      <main>
        <section class="review-header">
          <aside class="rating-summary reveal">
            <div class="rating-circle">
              <strong id="average-rating">4.7</strong>
            </div>
            <div class="rating-bars">
              <div><span>5</span><i><b style="width: 84%"></b></i></div>
              <div><span>4</span><i><b style="width: 62%"></b></i></div>
              <div><span>3</span><i><b style="width: 22%"></b></i></div>
              <div><span>2</span><i><b style="width: 10%"></b></i></div>
              <div><span>1</span><i><b style="width: 4%"></b></i></div>
            </div>
          </aside>

          <div class="review-shell reveal stagger-1">
            <div class="reviews-layout">
              <div class="review-list" id="review-list"></div>
              <form class="review-form" id="review-form">
                <h3>Yorum bırak</h3>
                <div class="field-row">
                  <label>
                    İsim
                    <input type="text" name="name" placeholder="Adınız" required />
                  </label>
                  <label>
                    Ürün
                    <select name="product" required>
                      <option value="Signature White">Signature White</option>
                      <option value="Shadow Ronin">Shadow Ronin</option>
                      <option value="Night Eclipse">Night Eclipse</option>
                    </select>
                  </label>
                </div>
                <label>
                  Puan
                  <select name="rating" required>
                    <option value="5">5/5</option>
                    <option value="4">4/5</option>
                    <option value="3">3/5</option>
                    <option value="2">2/5</option>
                    <option value="1">1/5</option>
                  </select>
                </label>
                <label>
                  Yorum
                  <textarea
                    name="comment"
                    rows="4"
                    placeholder="Kumaş, kalıp veya baskı deneyimini paylaş"
                    required
                  ></textarea>
                </label>
                <button class="button primary" type="submit">Değerlendirmeyi Gönder</button>
              </form>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./js/main.js"></script>
  </body>
</html>
